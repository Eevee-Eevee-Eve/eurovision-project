services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./deploy-secrets.local.env
    environment:
      PORT: "4000"
      CLIENT_ORIGIN: "https://morozoveuroparty.ru"
      APP_PUBLIC_URL: "https://morozoveuroparty.ru"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/public/uploads

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: "https://api.morozoveuroparty.ru"
        NEXT_PUBLIC_OPERATOR_NAME: "Morozov Euro Party"
        NEXT_PUBLIC_OPERATOR_CONTACT: "support@morozoveuroparty.ru"
        NEXT_PUBLIC_DATA_REGION: "Russian Federation"
        NEXT_PUBLIC_DATA_RETENTION: "Account data, ballots, and room standings are kept until the host resets the room or archives the season."
        NEXT_PUBLIC_PUBLIC_DISPLAY_NOTICE: "Public scoreboards show only the selected profile fields: nickname, avatar, and room scores."
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: "https://api.morozoveuroparty.ru"
      NEXT_PUBLIC_OPERATOR_NAME: "Morozov Euro Party"
      NEXT_PUBLIC_OPERATOR_CONTACT: "support@morozoveuroparty.ru"
      NEXT_PUBLIC_DATA_REGION: "Russian Federation"
      NEXT_PUBLIC_DATA_RETENTION: "Account data, ballots, and room standings are kept until the host resets the room or archives the season."
      NEXT_PUBLIC_PUBLIC_DISPLAY_NOTICE: "Public scoreboards show only the selected profile fields: nickname, avatar, and room scores."
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
