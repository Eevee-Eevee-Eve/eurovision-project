<!DOCTYPE html>
<html lang="ru">
<head>

  <title>Eurovision 2026 - Вход</title>

</head>
<body>

<header>

</header>

<div class="c">

  <input id="first" placeholder="Имя" />
  <input id="last"  placeholder="Фамилия" />

  <!-- выбор любимого эмодзи -->

      <option>😀</option><option>😁</option><option>🤣</option><option>😎</option>

      <option>🍣</option><option>🍩</option><option>🌮</option><option>🍺</option>
      <option>🏀</option><option>⚽</option><option>🎾</option><option>🥊</option>
      <option>🎮</option><option>🎸</option><option>🎷</option><option>🎤</option>
      <option>🚀</option><option>✈️</option><option>🚗</option><option>🛸</option>
      <option>📱</option><option>💻</option><option>🎧</option><option>📷</option>
      <option>🌟</option><option>🔥</option><option>💯</option><option>🏆</option>
    </select>
  </label>

  <button id="go">Далее</button>
  <p id="msg"></p>
</div>

</body>
</html>
