<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Прогноз | Eurovision 2026</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script defer src="predict.js"></script>
</head>
<body>

<header>
  <img src="logo.png" style="max-width:120px;width:40%" alt="logo" />
</header>

<div class="c">

  <!-- выбор полуфинала / финала -->
  <label>Секция:
    <select id="stageSel">
      <option value="semi1">1‑й полуфинал</option>
      <option value="semi2">2‑й полуфинал</option>
      <option value="final">Финал</option>
    </select>
  </label>

  <button id="logout" style="float:right;width:auto">Выход</button>

  <h2>Упорядочите все страны (победитель сверху)</h2>

  <ul id="lst"></ul>

  <button id="save">Сохранить</button>
  <button id="confirm">Подтвердить</button>

  <p id="msg"></p>
</div>

</body>
</html>
